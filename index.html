<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#00d4aa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BYM Scorer">
  <meta name="app-version" content="2026.03.26.07">
  <meta name="app-built" content="">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="76x76"   href="icons/icon-76.png">
  <title>Bugger Yer Mate</title>
  <style>
    /* Fonts — self-contained, no external requests */
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 700;
      src: local('Playfair Display Bold'), local('PlayfairDisplay-Bold'),
           local('Georgia Bold'), local('Georgia');
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 400;
      src: local('DM Sans'), local('DMSans-Regular'), local('Arial');
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 500;
      src: local('DM Sans Medium'), local('DMSans-Medium'), local('Arial');
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 600;
      src: local('DM Sans SemiBold'), local('DMSans-SemiBold'), local('Arial');
      font-display: swap;
    }
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 700;
      src: local('DM Sans Bold'), local('DMSans-Bold'), local('Arial');
      font-display: swap;
    }
    :root {
      --teal: #00d4aa;
      --teal-light: #00e8bb;
      --red: #e05252;
      --gold: #c9a961;
      --bg: #0a0a0a;
      --card: #141414;
      --border: #2a2a2a;
      --text: #ffffff;
      --text-secondary: #cccccc;
      --text-muted: #888888;
      --hillfred-black: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { height: 100%; height: 100dvh; }

    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Header ── */
    .app-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      padding-top: calc(8px + env(safe-area-inset-top));
      flex-shrink: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .header-logo {
      flex: 1;
    }

    .header-logo svg { height: 26px; width: auto; display: block; }

    .header-actions { display: flex; gap: 6px; }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(0,212,170,0.08);
      border: 1px solid rgba(0,212,170,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      color: var(--teal);
    }

    .icon-btn:active { transform: scale(0.92); background: rgba(0,212,170,0.18); }

    /* ── Game title strip ── */
    .game-title-strip {
      background: linear-gradient(135deg, rgba(0,212,170,0.07) 0%, rgba(0,0,0,0) 60%);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px 7px;
      text-align: center;
      flex-shrink: 0;
    }

    .game-title-strip h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .suits { display: inline-flex; gap: 4px; }
    .suit-red { color: #e05252; }
    .suit-black { color: #ffffff; }

    .game-title-strip p {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.3px;
      margin-top: 1px;
    }

    /* ── Container (setup screen) ── */
    .page {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
      padding: 10px 10px 40px;
    }

    /* ── GAME SCREEN: fills remaining height exactly ── */
    #gameScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    .game-round-bar {
      flex-shrink: 0;
      padding: 8px 10px 0;
    }

    .game-scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 10px 8px;
    }

    .game-footer {
      flex-shrink: 0;
      padding: 8px 10px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .card-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── Form elements ── */
    .form-group { margin-bottom: 12px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: #111;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 12px;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
      min-height: 44px;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: var(--teal);
      background: #151515;
    }

    /* ── Radio / toggle rows ── */
    .radio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .radio-option {
      background: #111;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-option.selected {
      border-color: var(--teal);
      background: rgba(0,212,170,0.08);
    }

    .radio-option input[type="radio"] { display: none; }

    .radio-option .opt-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: block;
    }

    .radio-option .opt-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .radio-option.selected .opt-title { color: var(--teal); }

    /* ── Player name inputs ── */
    .player-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .player-input-row input { flex: 1; }

    /* Single cycling dealer selector */
    .dealer-cycle-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(201,169,97,0.08);
      border: 1.5px solid rgba(201,169,97,0.4);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--gold);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .dealer-cycle-btn:active { background: rgba(201,169,97,0.18); }

    .dealer-cycle-btn span:first-child { font-size: 18px; }

    .dealer-cycle-arrow {
      margin-left: auto;
      font-size: 18px;
      opacity: 0.6;
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      background: var(--teal);
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      min-height: 48px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:active { transform: scale(0.98); background: var(--teal-light); }

    .btn-ghost {
      width: 100%;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      min-height: 42px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
    }

    .btn-ghost:active { border-color: var(--teal); color: var(--teal); }

    .btn-danger {
      width: 100%;
      background: var(--red);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      min-height: 42px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
    }

    .btn-danger:active { opacity: 0.85; transform: scale(0.98); }

    /* ── Round info card ── */
    .round-info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .info-tile {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 6px;
      text-align: center;
    }

    .info-tile .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      line-height: 1;
    }

    .info-tile .value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-top: 4px;
      line-height: 1;
    }

    /* ── Bid over/under indicator ── */
    .bid-indicator {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 8px;
      padding: 5px 10px;
      margin-top: 8px;
    }

    .bid-indicator.over {
      background: rgba(0, 200, 80, 0.1);
      border: 1px solid rgba(0, 200, 80, 0.3);
      color: #00c850;
    }

    .bid-indicator.under {
      background: rgba(224, 82, 82, 0.1);
      border: 1px solid rgba(224, 82, 82, 0.3);
      color: #ff8080;
    }

    /* ── Warning strips ── */
    .warn-strip {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(224,82,82,0.1);
      border: 1px solid rgba(224,82,82,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #ff8080;
    }

    .warn-strip.amber {
      background: rgba(201,169,97,0.1);
      border-color: rgba(201,169,97,0.3);
      color: var(--gold);
    }

    /* ── Scoring grid — stepper layout ── */
    .scoring-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .player-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-card.is-dealer { border-color: rgba(201,169,97,0.45); background: rgba(201,169,97,0.03); }
    .player-card.bids-locked { opacity: 0.92; }

    .player-card-info {
      flex: 1;
      min-width: 0;
    }

    .player-card-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-card-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-dealer   { background: rgba(201,169,97,0.18); color: var(--gold); }
    .badge-bid-order{ background: rgba(0,212,170,0.12);  color: var(--teal); }
    .player-running-score {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }
    .restriction-note {
      font-size: 13px; font-weight: 700; color: var(--red);
      background: rgba(224,82,82,0.08); border: 1px solid rgba(224,82,82,0.2);
      border-radius: 6px; padding: 6px 10px; display: block; width: 100%;
    }
    .dealer-cannot-note {
      font-size: 13px; font-weight: 700; color: var(--gold);
      background: rgba(201,169,97,0.08); border: 1px solid rgba(201,169,97,0.25);
      border-radius: 6px; padding: 6px 10px; display: none; width: 100%;
    }

    /* Stepper widget */
    .stepper-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stepper-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: #0d0d0d;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .stepper.locked {
      border-color: rgba(0,212,170,0.35);
      background: rgba(0,212,170,0.06);
    }

    .stepper-btn {
      width: 44px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 300;
      color: var(--teal);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .stepper-btn:active { background: rgba(0,212,170,0.15); }
    .stepper-btn.disabled { color: #333; pointer-events: none; }

    .stepper-val {
      width: 46px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      flex-shrink: 0;
    }

    .stepper.bid-confirmed {
      border-color: rgba(0,212,170,0.4);
    }
    .stepper.bid-confirmed .stepper-val {
      color: var(--teal);
    }
    .stepper.active-tricks {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201,169,97,0.15);
    }
    .stepper.active-tricks .stepper-val {
      color: var(--gold);
    }

    .stepper-pair {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    /* Phase badge replaced by inline action row */
    .round-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .round-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 6px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .round-action-btn:active { opacity: 0.75; }

    .round-action-btn.teal {
      background: rgba(0,212,170,0.12);
      color: var(--teal);
      border: 1px solid rgba(0,212,170,0.3);
    }

    .round-action-btn.gold {
      background: rgba(201,169,97,0.12);
      color: var(--gold);
      border: 1px solid rgba(201,169,97,0.3);
    }

    /* ── Scoreboard ── */
    .scoreboard-wrap { overflow-x: auto; margin: 0 -4px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 320px;
    }

    th {
      background: rgba(0,212,170,0.12);
      color: var(--teal);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 9px 6px;
      text-align: center;
      border-bottom: 1px solid rgba(0,212,170,0.2);
    }

    td {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid #1a1a1a;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .total-row td {
      font-weight: 700;
      color: var(--teal);
      background: rgba(0,212,170,0.05);
      border-top: 1px solid rgba(0,212,170,0.2);
      font-size: 15px;
    }

    tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    td .bid-tricks { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    /* ── Final standings ── */
    .standing-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
      border: 1.5px solid var(--border);
      background: #0a0a0a;
    }

    .standing-item.winner {
      border-color: rgba(201,169,97,0.5);
      background: rgba(201,169,97,0.04);
    }

    .standing-medal { font-size: 24px; min-width: 32px; text-align: center; }
    .standing-info { flex: 1; min-width: 0; }
    .standing-name { font-size: 16px; font-weight: 700; }
    .standing-detail { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .standing-score { font-size: 22px; font-weight: 700; color: var(--teal); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #222;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.error { border-color: rgba(224,82,82,0.5); color: #ff8080; }
    #toast.success { border-color: rgba(0,212,170,0.5); color: var(--teal); }
    #toast.warning { border-color: rgba(201,169,97,0.5); color: var(--gold); }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
    }

    .modal-sheet {
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 28px;
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      overflow-y: auto;
    }

    .modal-handle {
      width: 36px;
      height: 3px;
      background: #333;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-actions .btn-primary { margin: 0; }
    .modal-actions .btn-ghost { margin: 0; }

    /* ── Stats table ── */
    .stats-table { width: 100%; border-collapse: collapse; }
    .stats-table th {
      background: rgba(0,212,170,0.08);
      color: var(--teal);
      font-size: 12px;
      letter-spacing: 1px;
      padding: 8px 6px;
    }

    .stats-table td {
      padding: 9px 6px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .stats-table .highlight { color: var(--teal); font-weight: 700; }

    /* ── Edit modal inputs ── */
    .edit-player-block {
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .edit-player-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--teal);
      margin-bottom: 10px;
    }

    .edit-inputs-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hidden { display: none !important; }

    /* ── Responsive ── */
    @media (max-width: 360px) {
      .score-field input[type="number"] { width: 48px; font-size: 20px; }
      .player-card-name { font-size: 15px; }
      .round-info-grid { grid-template-columns: repeat(4, 1fr); gap: 4px; }
      .info-tile .value.big { font-size: 22px; }
    }

    @media (min-width: 480px) {
      .score-field input[type="number"] { width: 64px; }
    }

    /* ── Landscape ── */
    @media (max-height: 500px) and (orientation: landscape) {
      .app-header { padding-top: calc(4px + env(safe-area-inset-top)); padding-bottom: 4px; }
      .header-logo svg { height: 20px; }
      .game-round-bar { padding: 4px 8px 0; }
      .card { padding: 8px 10px; }
      .round-info-grid { gap: 4px; margin-top: 4px; }
      .info-tile { padding: 5px 4px; }
      .info-tile .label { font-size: 9px; }
      .info-tile .value { font-size: 15px; margin-top: 2px; }
      .round-actions { margin-top: 4px; }
      .round-action-btn { padding: 4px 10px; font-size: 12px; }
      .scoring-grid { gap: 4px; }
      .player-card { padding: 6px 8px; }
      .player-card-name { font-size: 14px; }
      .stepper-btn { width: 36px; height: 40px; font-size: 18px; }
      .stepper-val { font-size: 20px; width: 36px; }
      .stepper-label { font-size: 9px; }
    }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- ── HEADER ── -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-logo" onclick="showVersion()" style="cursor:pointer;-webkit-tap-highlight-color:transparent">
      <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(50, 60)">
          <g transform="rotate(45 28 28)">
            <rect x="0"  y="0"  width="16" height="16" fill="#ffffff" rx="1"/>
            <rect x="20" y="0"  width="16" height="16" fill="#00d4aa" rx="1"/>
            <rect x="40" y="0"  width="16" height="16" fill="#ffffff" rx="1"/>
            <rect x="0"  y="20" width="16" height="16" fill="#ffffff" rx="1"/>
            <rect x="20" y="20" width="16" height="16" fill="#ffffff" rx="1"/>
            <rect x="40" y="20" width="16" height="16" fill="#ffffff" rx="1"/>
            <rect x="0"  y="40" width="16" height="16" fill="#ffffff" rx="1"/>
            <rect x="20" y="40" width="16" height="16" fill="#ffffff" rx="1"/>
            <rect x="40" y="40" width="16" height="16" fill="#c9a961" rx="1"/>
          </g>
        </g>
        <text x="130" y="70" font-family="Playfair Display, Georgia, serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Hillfred</text>
        <rect x="130" y="76" width="80" height="1" fill="#00d4aa"/>
      </svg>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="headerScoresBtn" onclick="toggleScoreboard()" title="Scores" style="display:none">📊</button>
      <button class="icon-btn" id="headerUndoBtn" onclick="undoLastRound()" title="Undo Last Round" style="display:none">↩</button>
      <button class="icon-btn" id="headerNewBtn" onclick="resetGame()" title="New Game" style="display:none">↺</button>
      <div class="icon-btn" onclick="importStatisticsFromHeader()" title="Import Stats">⬆</div>
      <div class="icon-btn" onclick="showStatistics()" title="Statistics">📈</div>
    </div>
  </div>
</header>

<!-- Game title strip -->
<div class="game-title-strip">
  <h1>
    <span class="suits">
      <span class="suit-red">♥</span>
      <span class="suit-black">♣</span>
    </span>
    &nbsp;Bugger Yer Mate&nbsp;
    <span class="suits">
      <span class="suit-red">♦</span>
      <span class="suit-black">♠</span>
    </span>
  </h1>
  <p>Make bid = 10 + tricks · Miss = 1 per trick · Total bids ≠ cards dealt</p>
</div>

<!-- ═══════════════════════════════════════ SETUP SCREEN ═══════════════════════════════════════ -->
<div id="setupScreen" class="page">

  <div class="card">
    <div class="card-label">Game Setup</div>

    <div class="form-group">
      <label for="numPlayers">Number of Players</label>
      <input type="number" id="numPlayers" min="3" max="6" placeholder="3 – 6 players" inputmode="numeric" pattern="[0-9]*">
    </div>

    <div class="form-group">
      <label for="startCards">Starting Cards</label>
      <input type="number" id="startCards" min="1" max="13" placeholder="1 – 13 cards" inputmode="numeric" pattern="[0-9]*">
    </div>

    <div class="form-group">
      <label>Round Format</label>
      <div class="radio-row">
        <label class="radio-option selected" id="opt-down">
          <input type="radio" name="roundType" value="down" checked>
          <span class="opt-title">Half Way Pussy!</span>
          <span class="opt-sub">Count down only</span>
        </label>
        <label class="radio-option" id="opt-updown">
          <input type="radio" name="roundType" value="updown">
          <span class="opt-title">All The Way Baby!</span>
          <span class="opt-sub">Down then back up</span>
        </label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Players</div>
    <div id="playerNamesInputs"></div>
    <div id="dealerSelector" style="display:none;margin-top:10px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px">Starting Dealer</div>
      <button class="dealer-cycle-btn" id="dealerCycleBtn" onclick="cycleDealerSelection()">
        <span>🎴</span>
        <span id="dealerCycleName">Player 1</span>
        <span class="dealer-cycle-arrow">→</span>
      </button>
    </div>
  </div>

  <button class="btn-primary" onclick="startGame()">▶ Start Game</button>

</div>

<!-- ═══════════════════════════════════════ GAME SCREEN ═══════════════════════════════════════ -->
<div id="gameScreen" class="hidden">

  <!-- Round info — always visible, never scrolls -->
  <div class="game-round-bar">
    <div class="card" id="roundInfoCard">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0">
        <div class="card-label" id="roundLabel" style="margin-bottom:0">Round 1</div>
        <div class="card-label" id="roundProgress" style="margin-bottom:0;color:var(--text-muted)"></div>
      </div>

      <div class="round-info-grid">
        <div class="info-tile">
          <div class="label">Cards</div>
          <div class="value" id="currentCards">7</div>
        </div>
        <div class="info-tile">
          <div class="label">Trump</div>
          <div class="value" id="trumpSuit">—</div>
        </div>
        <div class="info-tile">
          <div class="label">Dealer</div>
          <div class="value" id="dealerName">—</div>
        </div>
        <div class="info-tile">
          <div class="label" id="bidsWonLabel">Bids / Won</div>
          <div class="value"><span id="totalBids">0</span> / <span id="totalTricks">0</span></div>
        </div>

      <div id="roundActions" class="round-actions">

  <!-- Player cards — scrollable area -->
  <div class="game-scroll-area">

    <!-- Scoreboard (shown after each round) -->

        <div class="scoreboard-wrap">

  <!-- Fixed footer — empty, actions moved to round card and header -->
  <div class="game-footer" style="padding:0;border:none;height:env(safe-area-inset-bottom)"></div>

</div>

<!-- ═══════════════════════════════════════ MODALS ═══════════════════════════════════════ -->

<!-- Stats modal -->
<div id="statsModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('statsModal')">

    </div>

    <div id="gameHistoryContent"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-ghost" onclick="exportStatistics()">⬇ Export</button>
      <button class="btn-ghost" onclick="importStatistics()">⬆ Import</button>
    </div>
    <button class="btn-danger" onclick="clearAllStatistics()" style="margin-top:8px">Clear All Stats</button>
    <button class="btn-ghost" onclick="closeModal('statsModal')">Close</button>
  </div>
</div>

<!-- Confirm modal -->
<div id="confirmModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('confirmModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="confirmTitle">Are you sure?</div>
    <p id="confirmBody" style="color:var(--text-secondary);font-size:14px;line-height:1.6;margin-bottom:16px"></p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="btn-primary" id="confirmOkBtn">Confirm</button>

</div>

<!-- Restore game modal -->
<div id="restoreModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🎴 Game In Progress</div>
    <p id="restoreBody" style="color:var(--text-secondary);font-size:14px;line-height:1.6;margin-bottom:16px"></p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="discardSavedGame()">Start Fresh</button>
      <button class="btn-primary" onclick="doRestoreGame()">Continue Game</button>
    </div>
  </div>
</div>

<!-- Round summary modal -->
<div id="roundSummaryModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('roundSummaryModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="roundSummaryTitle">Round Summary</div>
    <div id="roundSummaryContent"></div>
    <button class="btn-primary" style="margin-top:12px" onclick="closeModal('roundSummaryModal')">Next Round →</button>

<!-- Edit round modal -->
<div id="editModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('editModal')">

      <button class="btn-primary" id="editSaveBtn">Save Changes</button>
    </div>
  </div>
</div>

<script>
// ═══════════ CONSTANTS ═══════════
const TRUMP_SUITS = [
  { name: 'Hearts',   icon: '♥', color: '#e05252' },
  { name: 'Clubs',    icon: '♣', color: '#ffffff' },
  { name: 'Diamonds', icon: '♦', color: '#e05252' },
  { name: 'Spades',   icon: '♠', color: '#ffffff' },
  { name: 'No Trumps',icon: 'NT', color: '#00d4aa' }
];

// ═══════════ HAPTIC ═══════════
function haptic(style = 'light') {
  try {
    if (navigator.vibrate) {
      navigator.vibrate(style === 'heavy' ? 30 : style === 'medium' ? 15 : 8);
    }
    // iOS Haptic Feedback via Audio Context (silent pulse)
    if (window.AudioContext || window.webkitAudioContext) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0, ctx.currentTime);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.001);
    }
  } catch(e) {}
}

// ═══════════ SETUP MEMORY ═══════════
function saveSetupMemory() {
  try {
    const n = parseInt(document.getElementById('numPlayers').value) || 0;
    const names = [];
    for (let i = 0; i < n; i++) {
      names.push(document.getElementById(`playerName${i}`)?.value.trim() || '');
    }
    localStorage.setItem('bymSetup', JSON.stringify({
      numPlayers: n,
      startCards: document.getElementById('startCards').value,
      roundType: document.querySelector('input[name="roundType"]:checked')?.value || 'down',
      names,
      dealer: _selectedDealer
    }));
  } catch(e) {}
}

function loadSetupMemory() {
  try {
    const raw = localStorage.getItem('bymSetup');
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.numPlayers) {
      document.getElementById('numPlayers').value = s.numPlayers;
      updatePlayerInputs();
    }
    if (s.startCards) document.getElementById('startCards').value = s.startCards;
    if (s.roundType) {
      const radio = document.querySelector(`input[name="roundType"][value="${s.roundType}"]`);
      if (radio) {
        radio.checked = true;
        document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
        radio.closest('.radio-option')?.classList.add('selected');
      }
    }
    if (s.names) {
      s.names.forEach((name, i) => {
        const el = document.getElementById(`playerName${i}`);
        if (el && name) el.value = name;
      });
    }
    if (typeof s.dealer === 'number') {
      _selectedDealer = s.dealer;
      updateDealerLabel();
    }
  } catch(e) {}
}
let gs = {
  players: [],
  rounds: [],
  currentRound: 0,
  roundStructure: [],
  scores: [],
  dealerIndex: 0,
  currentDealerIndex: 0,
  tricksOrder: [],
  bidVals: {},
  trickVals: {}
};

let _bidsLocked = false; // tracks whether we're in bidding or tricks phase
let _savedGame = null;

// ═══════════ TOAST ═══════════
let _toastTimer = null;
function toast(msg, type = '', duration = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, duration);
}

// ═══════════ MODAL HELPERS ═══════════
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function confirmDialog(title, body, okLabel, okFn, okClass = '') {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').textContent = body;
  const btn = document.getElementById('confirmOkBtn');
  btn.textContent = okLabel;
  btn.className = okClass === 'danger' ? 'btn-danger' : 'btn-primary';
  btn.onclick = () => { closeModal('confirmModal'); okFn(); };
  openModal('confirmModal');
}

// ═══════════ SETUP UI ═══════════
let _selectedDealer = 0;

function updatePlayerInputs() {
  const n = parseInt(document.getElementById('numPlayers').value) || 0;
  const container = document.getElementById('playerNamesInputs');
  const dealerSelector = document.getElementById('dealerSelector');
  container.innerHTML = '';

  if (n < 3 || n > 6) {
    dealerSelector.style.display = 'none';
    return;
  }

  // Clamp selected dealer to valid range
  if (_selectedDealer >= n) _selectedDealer = 0;

  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    row.className = 'player-input-row';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = `Player ${i + 1}`;
    inp.id = `playerName${i}`;
    inp.addEventListener('input', updateDealerLabel);
    row.appendChild(inp);
    container.appendChild(row);
  }

  dealerSelector.style.display = 'block';
  updateDealerLabel();
}

function updateDealerLabel() {
  const n = parseInt(document.getElementById('numPlayers').value) || 0;
  const nameEl = document.getElementById(`playerName${_selectedDealer}`);
  const name = nameEl?.value.trim() || `Player ${_selectedDealer + 1}`;
  const btn = document.getElementById('dealerCycleName');
  if (btn) btn.textContent = name;
}

function cycleDealerSelection() {
  const n = parseInt(document.getElementById('numPlayers').value) || 0;
  if (n < 1) return;
  _selectedDealer = (_selectedDealer + 1) % n;
  updateDealerLabel();
}

// Radio option style toggle
document.querySelectorAll('.radio-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    opt.querySelector('input').checked = true;
  });
});

// ═══════════ GAME LOGIC ═══════════
function startGame() {
  const numPlayersEl = document.getElementById('numPlayers');
  const startCardsEl = document.getElementById('startCards');
  const numPlayers = parseInt(numPlayersEl.value);
  const startCards = parseInt(startCardsEl.value);

  // Inline validation
  numPlayersEl.style.borderColor = (!numPlayers || numPlayers < 3 || numPlayers > 6) ? 'var(--red)' : '';
  startCardsEl.style.borderColor = (!startCards || startCards < 1 || startCards > 13) ? 'var(--red)' : '';

  if (!numPlayers || numPlayers < 3 || numPlayers > 6) {
    numPlayersEl.focus(); return;
  }
  if (!startCards || startCards < 1 || startCards > 13) {
    startCardsEl.focus(); return;
  }

  const roundType = document.querySelector('input[name="roundType"]:checked').value;

  gs.players = [];
  for (let i = 0; i < numPlayers; i++) {
    const nameEl = document.getElementById(`playerName${i}`);
    gs.players.push((nameEl?.value.trim()) || `Player ${i + 1}`);
  }

  gs.dealerIndex = _selectedDealer;

  gs.roundStructure = [];
  for (let i = startCards; i >= 1; i--) gs.roundStructure.push(i);
  if (roundType === 'updown') for (let i = 2; i <= startCards; i++) gs.roundStructure.push(i);

  gs.scores = Array(numPlayers).fill(0);
  gs.rounds = [];
  gs.currentRound = 0;

  saveSetupMemory();

  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.getElementById('scoreboardSection').classList.add('hidden');
  document.querySelector('.game-title-strip').classList.add('hidden');
  document.getElementById('headerScoresBtn').style.display = 'flex';
  document.getElementById('headerNewBtn').style.display = 'flex';
  document.getElementById('headerUndoBtn').style.display = 'none';

  setupRound();
}

function setupRound() {
  const roundNum = gs.currentRound;
  const numCards = gs.roundStructure[roundNum];
  const trump = TRUMP_SUITS[roundNum % TRUMP_SUITS.length];
  const dealerIdx = (gs.dealerIndex + roundNum) % gs.players.length;
  const firstBidder = (dealerIdx + 1) % gs.players.length;

  gs.currentDealerIndex = dealerIdx;
  gs.tricksOrder = []; // ordered list of playerIdx values for tricks entry

  document.getElementById('roundLabel').textContent = `Round ${roundNum + 1}`;
  document.getElementById('roundProgress').textContent = `of ${gs.roundStructure.length}`;
  document.getElementById('currentCards').textContent = numCards;
  const trumpDisplay = trump.name === 'No Trumps'
    ? `<span style="color:${trump.color};font-size:16px;font-weight:700">NT</span>`
    : `<span style="color:${trump.color};font-size:22px;line-height:1">${trump.icon}</span>`;
  document.getElementById('trumpSuit').innerHTML = trumpDisplay;
  document.getElementById('dealerName').textContent = gs.players[dealerIdx];
  document.getElementById('totalBids').textContent = '0';
  document.getElementById('totalTricks').textContent = '0';

  // Reset to bidding phase
  _bidsLocked = false;
  const actionBtn = document.getElementById('mainActionBtn');
  if (actionBtn) { actionBtn.textContent = '🔒 Lock bids'; actionBtn.className = 'round-action-btn gold'; }

  // Show header game buttons
  document.getElementById('headerScoresBtn').style.display = 'flex';
  document.getElementById('headerNewBtn').style.display = 'flex';

  // Reset round card lock styling
  const roundCard = document.getElementById('roundInfoCard');
  if (roundCard) {
    roundCard.style.borderColor = '';
    roundCard.style.background  = '';
  }

  const container = document.getElementById('scoringInputs');
  container.innerHTML = '';

  // Remove any final standings card from previous game
  document.getElementById('standingsCard')?.remove();

  // State for all stepper values — keyed by playerIdx
  gs.bidVals   = {};
  gs.trickVals = {};
  gs.confirmedBidders = new Set();
  gs.players.forEach((_, idx) => { gs.bidVals[idx] = 0; gs.trickVals[idx] = 0; });

  // Build bidding order (fixed setup order) and tricks order
  gs.biddingOrder = [];
  gs.tricksOrder  = [];
  for (let i = 0; i < gs.players.length; i++) {
    gs.biddingOrder.push((firstBidder + i) % gs.players.length);
    gs.tricksOrder.push((firstBidder + i) % gs.players.length);
  }
  gs.currentBidderIdx = gs.biddingOrder[0];

  for (let playerIdx = 0; playerIdx < gs.players.length; playerIdx++) {
    const isDealer = playerIdx === dealerIdx;
    const player   = gs.players[playerIdx];

    // Bid position: how many steps after the dealer this player bids (1 = first, n = last/dealer)
    const bidPos = ((playerIdx - firstBidder + gs.players.length) % gs.players.length) + 1;

    // Check consecutive bid restriction
    let forbiddenBids = [];
    if (gs.rounds.length >= 2) {
      const p1 = gs.rounds[gs.rounds.length - 1].bids[playerIdx];
      const p2 = gs.rounds[gs.rounds.length - 2].bids[playerIdx];
      if (p1 === p2) forbiddenBids.push(p1);
    }

    const badge = isDealer
      ? `<span class="badge badge-dealer">🎴 Dealer</span>`
      : `<span class="badge badge-bid-order">Bids ${bidPos}${ordSuffix(bidPos)}</span>`;

    const div = document.createElement('div');
    div.className = 'player-card' + (isDealer ? ' is-dealer' : '');
    div.id = `pcard${playerIdx}`;
    div.innerHTML = `
      <div style="display:flex;flex-direction:column;width:100%;gap:6px">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="player-card-info">
            <div class="player-card-name">${player}</div>
            <div class="player-card-meta">
              ${badge}
              <span class="player-running-score" id="runScore${playerIdx}">${gs.scores[playerIdx] > 0 ? gs.scores[playerIdx] + ' pts' : ''}</span>
            </div>
          </div>
          <div class="stepper-pair">
            <div class="stepper-group">
              <div class="stepper-label">Bid</div>
              <div class="stepper locked" id="bidStepper${playerIdx}">
                <div class="stepper-btn disabled" id="bidMinus${playerIdx}" onclick="stepBid(${playerIdx},-1)">−</div>
                <div class="stepper-val" id="bidVal${playerIdx}" onclick="unlockBidForEdit(${playerIdx})" style="cursor:pointer">0</div>
                <div class="stepper-btn disabled" id="bidPlus${playerIdx}" onclick="stepBid(${playerIdx},+1)">+</div>
              </div>
            </div>
            <div class="stepper-group">
              <div class="stepper-label">Won</div>
              <div class="stepper locked" id="wonStepper${playerIdx}">
                <div class="stepper-btn disabled" id="wonMinus${playerIdx}" onclick="stepTrick(${playerIdx},-1)">−</div>
                <div class="stepper-val" id="wonVal${playerIdx}">0</div>
                <div class="stepper-btn disabled" id="wonPlus${playerIdx}" onclick="stepTrick(${playerIdx},+1)">+</div>
              </div>
            </div>
          </div>
        </div>
        ${forbiddenBids.length ? `<div class="restriction-note">✗ Cannot bid ${forbiddenBids.join(' or ')} (3 in a row)</div>` : ''}
        ${isDealer ? `<div class="dealer-cannot-note" id="dealerNote${playerIdx}">🚫 Dealer cannot bid <strong id="dealerForbid${playerIdx}"></strong></div>` : ''}
      </div>
    `;
    container.appendChild(div);
  }

  // Activate only the first bidder
  activateBidStepper(gs.currentBidderIdx);
  updateTotals();
}

function ordSuffix(n) {
  const j = n % 10, k = n % 100;
  if (j === 1 && k !== 11) return 'st';
  if (j === 2 && k !== 12) return 'nd';
  if (j === 3 && k !== 13) return 'rd';
  return 'th';
}

function stepBid(idx, delta) {
  if (_bidsLocked) return;
  const order = gs.biddingOrder;
  const myPos = order.indexOf(idx);
  const currentPos = order.indexOf(gs.currentBidderIdx);
  if (myPos > currentPos) return;

  haptic('light');
  const numCards = gs.roundStructure[gs.currentRound];
  const oldVal = gs.bidVals[idx] || 0;
  const newVal = Math.max(0, Math.min(numCards, oldVal + delta));
  gs.bidVals[idx] = newVal;
  document.getElementById(`bidVal${idx}`).textContent = newVal;
  document.getElementById(`bidMinus${idx}`)?.classList.toggle('disabled', newVal === 0);
  document.getElementById(`bidStepper${idx}`)?.classList.add('bid-confirmed');

  // First + tap on the current active bidder advances to next player
  if (delta > 0 && !gs.confirmedBidders.has(idx) && idx === gs.currentBidderIdx) {
    gs.confirmedBidders.add(idx);
    advanceBidder(idx);
  }

  updateTotals();
}

function unlockBidForEdit(idx) {
  // Allow tapping a previously-confirmed bid stepper to re-edit it
  if (_bidsLocked) return;
  const order = gs.biddingOrder;
  const myPos = order.indexOf(idx);
  const currentPos = order.indexOf(gs.currentBidderIdx);
  // Only allow re-editing players who have already bid (before current)
  if (myPos >= currentPos && gs.currentBidderIdx !== -1) return;
  haptic('light');
  // Snap current bidder back to this player so they can adjust
  gs.currentBidderIdx = idx;
  activateBidStepper(idx);
}

function advanceBidder(idx) {
  const order = gs.biddingOrder;
  const pos = order.indexOf(idx);
  if (pos < order.length - 1) {
    gs.currentBidderIdx = order[pos + 1];
    activateBidStepper(gs.currentBidderIdx);
  }
  // Last player (dealer) — stays active until Lock Bids
}

function activateBidStepper(idx) {
  const stepper = document.getElementById(`bidStepper${idx}`);
  if (stepper) stepper.classList.remove('locked');
  document.getElementById(`bidMinus${idx}`)?.classList.toggle('disabled', (gs.bidVals[idx] || 0) === 0);
  document.getElementById(`bidPlus${idx}`)?.classList.remove('disabled');
  document.getElementById(`pcard${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function stepTrick(idx, delta) {
  if (!_bidsLocked) return;
  // Enforce order — only active tricks player or already-entered players
  const order = gs.tricksOrder;
  const myPos = order.indexOf(idx);
  const currentPos = order.indexOf(gs.currentTricksIdx);
  if (myPos > currentPos) return;

  haptic('light');
  const numCards = gs.roundStructure[gs.currentRound];
  const oldVal = gs.trickVals[idx] || 0;
  const newVal = Math.max(0, Math.min(numCards, oldVal + delta));
  gs.trickVals[idx] = newVal;
  document.getElementById(`wonVal${idx}`).textContent = newVal;
  document.getElementById(`wonMinus${idx}`)?.classList.toggle('disabled', newVal === 0);

  // First + tap on current tricks player advances to next
  if (delta > 0 && !gs.confirmedTricks.has(idx) && idx === gs.currentTricksIdx) {
    gs.confirmedTricks.add(idx);
    advanceTricks(idx);
  }

  autoCompleteTricks();
  updateTotals();
}

function advanceTricks(idx) {
  const order = gs.tricksOrder;
  const pos = order.indexOf(idx);
  if (pos < order.length - 1) {
    gs.currentTricksIdx = order[pos + 1];
    highlightActiveTricksCard(gs.currentTricksIdx);
  }
}

function highlightActiveTricksCard(idx) {
  // Remove highlight from all won steppers, add to active
  gs.players.forEach((_, i) => {
    const s = document.getElementById(`wonStepper${i}`);
    if (s) s.classList.toggle('active-tricks', i === idx);
  });
  document.getElementById(`pcard${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function autoCompleteTricks() {
  const numCards = gs.roundStructure[gs.currentRound];
  const order = gs.tricksOrder;
  const lastIdx = order[order.length - 1];

  // Sum all but last player
  let filledCount = 0, total = 0;
  for (let i = 0; i < order.length - 1; i++) {
    const v = gs.trickVals[order[i]];
    if (v !== undefined && v !== null) { filledCount++; total += v; }
  }

  if (filledCount === order.length - 1) {
    const remaining = numCards - total;
    if (remaining >= 0 && remaining <= numCards) {
      gs.trickVals[lastIdx] = remaining;
      document.getElementById(`wonVal${lastIdx}`).textContent = remaining;
      document.getElementById(`wonMinus${lastIdx}`)?.classList.toggle('disabled', remaining === 0);
      haptic('medium');
    }
  }
}

function updateTotals() {
  const numCards = gs.roundStructure[gs.currentRound];
  if (!numCards) return;

  let totalTricks = 0;
  gs.players.forEach((_, idx) => { totalTricks += gs.trickVals[idx] || 0; });

  document.getElementById('totalTricks').textContent = totalTricks;

  if (_bidsLocked) return;

  let totalBids = 0;
  gs.players.forEach((_, idx) => { totalBids += gs.bidVals[idx] || 0; });
  document.getElementById('totalBids').textContent = totalBids;

  // Dealer forbidden bid — shown only in the player card
  const dealerIdx = gs.currentDealerIndex;
  let otherBids = 0;
  gs.players.forEach((_, idx) => { if (idx !== dealerIdx) otherBids += gs.bidVals[idx] || 0; });
  const forbidden = numCards - otherBids;
  const dnote   = document.getElementById(`dealerNote${dealerIdx}`);
  const dforbid = document.getElementById(`dealerForbid${dealerIdx}`);
  if (dnote && dforbid) {
    if (forbidden >= 0 && forbidden <= numCards) {
      dforbid.textContent = forbidden;
      dnote.style.display = 'block';
    } else {
      dnote.style.display = 'none';
    }
  }
}

function handleMainAction() {
  if (_bidsLocked) {
    submitRound();
  } else {
    lockBids();
  }
}

function lockBids() {
  const numCards = gs.roundStructure[gs.currentRound];

  // Validate — all bids are already set (default 0 is a valid bid)
  let totalBids = 0;
  const bids = gs.players.map((_, idx) => gs.bidVals[idx] || 0);
  bids.forEach(b => totalBids += b);

  if (totalBids === numCards) { toast('Total bids cannot equal cards dealt', 'error'); return; }

  // Consecutive bid check
  if (gs.rounds.length >= 2) {
    for (let idx = 0; idx < gs.players.length; idx++) {
      const p1 = gs.rounds[gs.rounds.length - 1].bids[idx];
      const p2 = gs.rounds[gs.rounds.length - 2].bids[idx];
      if (bids[idx] === p1 && bids[idx] === p2) {
        toast(`${gs.players[idx]} cannot bid ${bids[idx]} three times in a row`, 'error'); return;
      }
    }
  }

  _bidsLocked = true;
  haptic('medium');
  gs.currentTricksIdx = gs.tricksOrder[0];
  gs.confirmedTricks = new Set();

  // Lock bid steppers visually, enable won steppers
  gs.players.forEach((_, idx) => {
    const bidStepper = document.getElementById(`bidStepper${idx}`);
    if (bidStepper) bidStepper.classList.add('locked');
    const wonStepper = document.getElementById(`wonStepper${idx}`);
    if (wonStepper) wonStepper.classList.remove('locked');
    // Enable won +/- buttons
    const wonPlus  = document.getElementById(`wonPlus${idx}`);
    const wonMinus = document.getElementById(`wonMinus${idx}`);
    if (wonPlus)  wonPlus.classList.remove('disabled');
    if (wonMinus) wonMinus.classList.remove('disabled');
    // Hide dealer/restriction notes
    const dn = document.getElementById(`dealerNote${idx}`);
    if (dn) dn.style.display = 'none';
  });

  // Visually lock the round info card
  const roundCard = document.getElementById('roundInfoCard');
  if (roundCard) {
    roundCard.style.borderColor = 'rgba(0,212,170,0.35)';
    roundCard.style.background  = 'rgba(0,212,170,0.03)';
  }
  const bidsLabel = document.getElementById('bidsWonLabel');
  if (bidsLabel) bidsLabel.textContent = 'Bids 🔒 / Won';

  const actionBtn = document.getElementById('mainActionBtn');
  if (actionBtn) { actionBtn.textContent = '✓ Submit round'; actionBtn.className = 'round-action-btn teal'; }

  // Highlight first tricks player
  setTimeout(() => highlightActiveTricksCard(gs.currentTricksIdx), 50);

  toast('Bids locked! Enter tricks won.', 'success');
}

function submitRound() {
  const numCards = gs.roundStructure[gs.currentRound];

  const bids   = gs.players.map((_, idx) => gs.bidVals[idx]   || 0);
  const tricks = gs.players.map((_, idx) => gs.trickVals[idx] || 0);
  const totalTricks = tricks.reduce((a, b) => a + b, 0);

  if (totalTricks !== numCards) {
    toast(`Tricks must total ${numCards} — currently ${totalTricks}`, 'error'); return;
  }

  const trump = TRUMP_SUITS[gs.currentRound % TRUMP_SUITS.length];
  const roundData = {
    cards: numCards,
    trump,
    dealer: gs.players[gs.currentDealerIndex],
    bids, tricks,
    points: bids.map((b, i) => b === tricks[i] ? 10 + tricks[i] : tricks[i])
  };

  gs.rounds.push(roundData);
  roundData.points.forEach((pts, i) => { gs.scores[i] += pts; });
  gs.currentRound++;

  saveGameState();
  haptic('heavy');
  document.getElementById('headerUndoBtn').style.display = 'flex';

  if (gs.currentRound >= gs.roundStructure.length) {
    recordGameResults();
    clearSavedGame();
    showFinalResults();
  } else {
    showRoundSummary(roundData, gs.currentRound);
  }
}

function showRoundSummary(roundData, nextRoundNum) {
  const title = document.getElementById('roundSummaryTitle');
  const content = document.getElementById('roundSummaryContent');
  title.textContent = `Round ${nextRoundNum} Complete`;

  let html = '';
  gs.players.forEach((name, idx) => {
    const bid = roundData.bids[idx];
    const won = roundData.tricks[idx];
    const pts = roundData.points[idx];
    const made = bid === won;
    const colour = made ? 'var(--teal)' : 'var(--red)';
    const icon = made ? '✓' : '✗';
    html += `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:700;font-size:15px">${name}</div>
          <div style="font-size:13px;color:var(--text-muted)">Bid ${bid} · Won ${won}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:700;color:${colour}">${icon} +${pts}</div>
          <div style="font-size:12px;color:var(--text-muted)">${gs.scores[idx]} total</div>
        </div>
      </div>`;
  });
  content.innerHTML = html;

  openModal('roundSummaryModal');

  // Auto-dismiss after 4 seconds
  const autoDismiss = setTimeout(() => {
    if (!document.getElementById('roundSummaryModal').classList.contains('hidden')) {
      proceedToNextRound();
    }
  }, 4000);

  // Wire up "Next Round" to proceed immediately
  const btn = document.querySelector('#roundSummaryModal .btn-primary');
  btn.onclick = () => { clearTimeout(autoDismiss); proceedToNextRound(); };
}

function proceedToNextRound() {
  closeModal('roundSummaryModal');
  document.getElementById('scoreboardSection').classList.remove('hidden');
  updateScoreboard();
  setupRound();
  document.querySelector('.game-scroll-area').scrollTop = 0;
}

function undoLastRound() {
  if (!gs.rounds.length) { toast('Nothing to undo', 'warning'); return; }
  confirmDialog(
    'Undo Last Round?',
    `This will remove Round ${gs.rounds.length} and restore all scores.`,
    'Undo',
    () => {
      const last = gs.rounds.pop();
      last.points.forEach((pts, i) => { gs.scores[i] -= pts; });
      gs.currentRound--;
      saveGameState();
      haptic('medium');
      document.getElementById('scoreboardSection').classList.remove('hidden');
      updateScoreboard();
      setupRound();
      document.querySelector('.game-scroll-area').scrollTop = 0;
      // Hide undo if no rounds left
      if (!gs.rounds.length) document.getElementById('headerUndoBtn').style.display = 'none';
      toast('Round undone', 'success');
    }
  );
}

function showFinalResults() {
  // Build rankings
  const ranks = gs.players.map((name, idx) => {
    let succBids = 0, totBids = 0;
    gs.rounds.forEach(r => {
      totBids += r.bids[idx];
      if (r.bids[idx] === r.tricks[idx]) succBids++;
    });
    return { name, idx, score: gs.scores[idx], succBids, totBids };
  });

  ranks.sort((a, b) => b.score - a.score || b.succBids - a.succBids || b.totBids - a.totBids);

  // Assign ranks with ties
  let curRank = 1;
  ranks.forEach((p, i) => {
    if (i === 0) { p.rank = 1; return; }
    const prev = ranks[i - 1];
    p.rank = (p.score === prev.score && p.succBids === prev.succBids && p.totBids === prev.totBids)
      ? prev.rank : i + 1;
    if (p.rank > curRank) curRank = p.rank;
  });

  const medals = ['🥇', '🥈', '🥉'];

  // Clear game UI, show results
  document.getElementById('scoringInputs').innerHTML = '';
  document.getElementById('roundInfoCard').innerHTML = `
    <div class="card-label" style="color:var(--gold);margin-bottom:4px">🏆 Game Complete!</div>
    <p style="color:var(--text-muted);font-size:14px">${gs.roundStructure.length} rounds · ${gs.players.length} players</p>
  `;

  const mainBtn = document.getElementById('mainActionBtn');
  if (mainBtn) mainBtn.style.display = 'none';

  // Restore secondary buttons (scoreboard, stats, new game) for end screen
  // Final standings card — insert at top of scroll area
  const standCard = document.createElement('div');
  standCard.className = 'card';
  standCard.id = 'standingsCard';
  standCard.innerHTML = `<div class="card-label" style="color:var(--gold)">Final Standings</div>`;

  ranks.forEach(p => {
    const medal = medals[p.rank - 1] || `${p.rank}.`;
    const item = document.createElement('div');
    item.className = 'standing-item' + (p.rank === 1 ? ' winner' : '');
    item.innerHTML = `
      <div class="standing-medal">${medal}</div>
      <div class="standing-info">
        <div class="standing-name">${p.name}</div>
        <div class="standing-detail">${p.succBids} successful bids · ${p.totBids} total bids</div>
      </div>
      <div class="standing-score">${p.score}</div>
    `;
    standCard.appendChild(item);
  });

  // Play Again button
  const playAgainBtn = document.createElement('button');
  playAgainBtn.className = 'btn-primary';
  playAgainBtn.style.marginTop = '12px';
  playAgainBtn.textContent = '▶ Play Again (same players)';
  playAgainBtn.onclick = playAgain;
  standCard.appendChild(playAgainBtn);

  const scrollArea = document.querySelector('.game-scroll-area');
  scrollArea.insertBefore(standCard, scrollArea.firstChild);
  scrollArea.scrollTop = 0;

  // Show scoreboard
  document.getElementById('scoreboardSection').classList.remove('hidden');
  updateScoreboard();
}

// ═══════════ SCOREBOARD ═══════════
function toggleScoreboard() {
  const s = document.getElementById('scoreboardSection');
  s.classList.toggle('hidden');
  if (!s.classList.contains('hidden')) updateScoreboard();
}

function updateScoreboard() {
  const table = document.getElementById('scoreboardTable');
  let html = `<tr><th>#</th><th>Cards</th><th>Trump</th><th>Dealer</th>`;
  gs.players.forEach(p => {
    const abbr = p.length > 6 ? p.slice(0, 5) + '…' : p;
    html += `<th title="${p}">${abbr}</th>`;
  });
  html += `<th></th></tr>`;

  gs.rounds.forEach((r, ri) => {
    const trumpDisplay = `<span style="color:${r.trump.color}">${r.trump.icon}</span>`;
    html += `<tr><td>${ri + 1}</td><td>${r.cards}</td><td>${trumpDisplay}</td><td>${r.dealer}</td>`;
    r.points.forEach((pts, pi) => {
      html += `<td>${pts}<div class="bid-tricks">${r.bids[pi]}/${r.tricks[pi]}</div></td>`;
    });
    html += `<td><button onclick="editRound(${ri})" style="background:rgba(0,212,170,0.15);color:var(--teal);border:1px solid rgba(0,212,170,0.3);border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer;font-weight:700">Edit</button></td></tr>`;
  });

  html += `<tr class="total-row"><td colspan="4">Total</td>`;
  gs.scores.forEach(s => { html += `<td>${s}</td>`; });
  html += `<td></td></tr>`;

  table.innerHTML = html;
}

// ═══════════ EDIT ROUND ═══════════
function editRound(roundIdx) {
  const r = gs.rounds[roundIdx];
  document.getElementById('editModalTitle').textContent = `Edit Round ${roundIdx + 1} · ${r.cards} cards`;

  const container = document.getElementById('editInputs');
  container.innerHTML = '';

  gs.players.forEach((name, pi) => {
    const block = document.createElement('div');
    block.className = 'edit-player-block';
    block.innerHTML = `
      <div class="edit-player-name">${name}</div>
      <div class="edit-inputs-row">
        <div class="score-field">
          <label>Bid</label>
          <input type="number" id="editBid${pi}" value="${r.bids[pi]}" min="0" max="${r.cards}"
                 inputmode="numeric" style="text-align:center;font-size:20px;font-weight:700">
        </div>
        <div class="score-field">
          <label>Tricks Won</label>
          <input type="number" id="editTricks${pi}" value="${r.tricks[pi]}" min="0" max="${r.cards}"
                 inputmode="numeric" style="text-align:center;font-size:20px;font-weight:700">
        </div>
      </div>
    `;
    container.appendChild(block);
  });

  document.getElementById('editSaveBtn').onclick = () => saveEditedRound(roundIdx);
  openModal('editModal');
}

function saveEditedRound(roundIdx) {
  const r = gs.rounds[roundIdx];
  const numCards = r.cards;
  let totalBids = 0, totalTricks = 0;
  const newBids = [], newTricks = [];

  gs.players.forEach((_, pi) => {
    const b = parseInt(document.getElementById(`editBid${pi}`)?.value) || 0;
    const t = parseInt(document.getElementById(`editTricks${pi}`)?.value) || 0;
    newBids.push(b); newTricks.push(t);
    totalBids += b; totalTricks += t;
  });

  if (totalBids === numCards) { toast('Total bids cannot equal cards dealt', 'error'); return; }
  if (totalTricks !== numCards) { toast(`Tricks must total ${numCards} (currently ${totalTricks})`, 'error'); return; }

  r.bids = newBids;
  r.tricks = newTricks;
  r.points = newBids.map((b, i) => b === newTricks[i] ? 10 + newTricks[i] : newTricks[i]);

  // Recalculate all scores
  gs.scores = Array(gs.players.length).fill(0);
  gs.rounds.forEach(round => {
    round.points.forEach((pts, i) => { gs.scores[i] += pts; });
  });

  closeModal('editModal');
  updateScoreboard();
  saveGameState();
  toast('Round updated!', 'success');
}

// ═══════════ SAVE / RESTORE ═══════════
function saveGameState() {
  try {
    localStorage.setItem('bymGameState', JSON.stringify({
      players: gs.players, rounds: gs.rounds,
      currentRound: gs.currentRound, roundStructure: gs.roundStructure,
      scores: gs.scores, dealerIndex: gs.dealerIndex,
      savedAt: new Date().toISOString()
    }));
  } catch(e) {}
}

function loadGameState() {
  try {
    const raw = localStorage.getItem('bymGameState');
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data.players?.length || !data.roundStructure?.length) return null;
    if (data.currentRound >= data.roundStructure.length) { clearSavedGame(); return null; }
    return data;
  } catch(e) { clearSavedGame(); return null; }
}

function clearSavedGame() { localStorage.removeItem('bymGameState'); }

function doRestoreGame() {
  if (!_savedGame) return;
  const g = _savedGame;
  gs.players = g.players;
  gs.rounds = g.rounds;
  gs.currentRound = g.currentRound;
  gs.roundStructure = g.roundStructure;
  gs.scores = g.scores;
  gs.dealerIndex = g.dealerIndex;

  closeModal('restoreModal');
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  document.querySelector('.game-title-strip').classList.add('hidden');
  document.getElementById('headerScoresBtn').style.display = 'flex';
  document.getElementById('headerNewBtn').style.display = 'flex';
  if (gs.rounds.length > 0) document.getElementById('headerUndoBtn').style.display = 'flex';
  document.getElementById('scoreboardSection').classList.remove('hidden');
  updateScoreboard();
  setupRound();
}

function discardSavedGame() {
  clearSavedGame();
  closeModal('restoreModal');
}

function getTimeAgo(dateStr) {
  try {
    const secs = Math.floor((new Date() - new Date(dateStr)) / 1000);
    if (secs < 60) return 'just now';
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  } catch(e) { return 'recently'; }
}

// ═══════════ RESET ═══════════
function resetGame() {
  confirmDialog(
    'Start New Game?',
    'All current progress will be lost.',
    'New Game',
    () => { clearSavedGame(); location.reload(); },
    ''
  );
}

function playAgain() {
  // Keep same players + settings, just restart the round structure
  const players = [...gs.players];
  const startCards = gs.roundStructure[0]; // first round = starting cards
  const isUpDown = gs.roundStructure[gs.roundStructure.length - 1] === startCards;

  clearSavedGame();

  gs.rounds = [];
  gs.currentRound = 0;
  gs.scores = Array(players.length).fill(0);
  gs.dealerIndex = (gs.dealerIndex + 1) % players.length; // rotate starting dealer

  gs.roundStructure = [];
  for (let i = startCards; i >= 1; i--) gs.roundStructure.push(i);
  if (isUpDown) for (let i = 2; i <= startCards; i++) gs.roundStructure.push(i);

  document.getElementById('standingsCard')?.remove();
  document.getElementById('scoreboardSection').classList.add('hidden');
  document.getElementById('headerUndoBtn').style.display = 'none';

  const mainBtn = document.getElementById('mainActionBtn');
  if (mainBtn) mainBtn.style.display = '';

  setupRound();
  document.querySelector('.game-scroll-area').scrollTop = 0;
  toast('New game — same players!', 'success');
}

// ═══════════ STATISTICS ═══════════
function loadStats() {
  try { return JSON.parse(localStorage.getItem('bymStats') || '{}'); } catch(e) { return {}; }
}

function saveStats(s) { localStorage.setItem('bymStats', JSON.stringify(s)); }

function recordGameResults() {
  const stats = loadStats();
  const maxScore = Math.max(...gs.scores);
  const winnerIndices = gs.scores.map((s, i) => s === maxScore ? i : -1).filter(i => i !== -1);
  const gameDate = new Date().toISOString();

  gs.players.forEach((name, idx) => {
    if (!stats[name]) stats[name] = { gamesPlayed: 0, wins: 0, totalScore: 0, totalRounds: 0, highestScore: 0, history: [] };
    const p = stats[name];
    p.gamesPlayed++;
    p.totalScore += gs.scores[idx];
    p.totalRounds += gs.rounds.length;
    if (gs.scores[idx] > p.highestScore) p.highestScore = gs.scores[idx];
    if (winnerIndices.includes(idx)) p.wins++;
    if (!p.history) p.history = [];
    p.history.unshift({
      date: gameDate,
      score: gs.scores[idx],
      won: winnerIndices.includes(idx),
      rounds: gs.rounds.length,
      players: gs.players.join(', ')
    });
    if (p.history.length > 20) p.history = p.history.slice(0, 20); // keep last 20
  });

  saveStats(stats);
}

function showStatistics() {
  const stats = loadStats();
  const names = Object.keys(stats).sort();

  if (names.length === 0) {
    toast('No stats yet — complete a game first!', 'warning');
    return;
  }

  let html = `<tr>
    <th style="text-align:left">Player</th>
    <th>Games</th><th>Wins</th><th>Win%</th>
    <th>Avg/Game</th><th>Avg/Round</th><th>High</th>
  </tr>`;

  names.forEach((name, i) => {
    const p = stats[name];
    const winPct = ((p.wins / p.gamesPlayed) * 100).toFixed(0);
    const avgGame = (p.totalScore / p.gamesPlayed).toFixed(1);
    const avgRound = p.totalRounds > 0 ? (p.totalScore / p.totalRounds).toFixed(1) : '0.0';
    const bg = i % 2 ? '' : 'background:rgba(255,255,255,0.02)';
    html += `<tr style="${bg}">
      <td style="text-align:left;font-weight:700;color:var(--text)">${name}</td>
      <td>${p.gamesPlayed}</td>
      <td>${p.wins}</td>
      <td>${winPct}%</td>
      <td>${avgGame}</td>
      <td class="highlight">${avgRound}</td>
      <td>${p.highestScore}</td>
    </tr>`;
  });

  document.getElementById('statsTableEl').innerHTML = html;

  // Build game history — collect all games across all players, deduplicated by date
  const allGames = [];
  names.forEach(name => {
    const p = stats[name];
    (p.history || []).forEach(g => {
      let entry = allGames.find(e => e.date === g.date);
      if (!entry) { entry = { date: g.date, players: g.players, rounds: g.rounds, scores: {} }; allGames.push(entry); }
      entry.scores[name] = { score: g.score, won: g.won };
    });
  });
  allGames.sort((a, b) => new Date(b.date) - new Date(a.date));

  let histHtml = '';
  allGames.slice(0, 10).forEach(g => {
    const d = new Date(g.date);
    const dateStr = d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    const playerEntries = Object.entries(g.scores)
      .sort((a, b) => b[1].score - a[1].score)
      .map(([name, data]) => `<span style="color:${data.won ? 'var(--teal)' : 'var(--text-muted)'};font-weight:${data.won ? '700' : '400'}">${name} ${data.score}</span>`)
      .join(' · ');
    histHtml += `
      <div style="padding:9px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px">${dateStr} · ${g.rounds} rounds</div>
        <div style="font-size:13px;line-height:1.5">${playerEntries}</div>
      </div>`;
  });

  const histEl = document.getElementById('gameHistoryContent');
  if (histEl) histEl.innerHTML = histHtml || '<p style="color:var(--text-muted);font-size:13px">No history yet</p>';

  openModal('statsModal');
}

function exportStatistics() {
  const stats = loadStats();
  if (!Object.keys(stats).length) { toast('No stats to export', 'warning'); return; }
  const data = JSON.stringify({ version: '1.0', exportDate: new Date().toISOString(), statistics: stats }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bym-stats-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Stats exported!', 'success');
}

function importStatistics() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.statistics) { toast('Invalid stats file', 'error'); return; }
        confirmDialog(
          'Import Statistics?',
          `This will replace your current stats. Exported: ${new Date(data.exportDate).toLocaleDateString()}`,
          'Import',
          () => {
            saveStats(data.statistics);
            closeModal('statsModal');
            toast('Stats imported!', 'success');
          }
        );
      } catch(err) { toast('Could not read file', 'error'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function showVersion() {
  const v = document.querySelector('meta[name="app-version"]')?.content || 'unknown';
  // Also show cache status
  const built = document.querySelector('meta[name="app-built"]')?.content || '';
  const builtStr = built ? ` · built ${built}` : '';
  toast(`v${v}${builtStr}`, 'success', 3000);
}

function importStatisticsFromHeader() { importStatistics(); }

// ═══════════ SERVICE WORKER ═══════════
if ('serviceWorker' in navigator && location.hostname !== 'www.claudeusercontent.com') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Get version from whichever SW is in control
      const sw = reg.active || reg.waiting || reg.installing;
      if (sw) sw.postMessage({ type: 'GET_VERSION' });

      // Also listen for a new SW becoming active
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        if (newSW) {
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'activated') {
              newSW.postMessage({ type: 'GET_VERSION' });
            }
          });
        }
      });
    }).catch(() => {});
  });

  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'VERSION') {
      const meta = document.querySelector('meta[name="app-built"]');
      if (meta) meta.content = e.data.version;
    }
  });

  // If a SW is already controlling this page, ask for version immediately
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'GET_VERSION' });
  }
}

function clearAllStatistics() {
  confirmDialog(
    'Clear All Statistics?',
    'This cannot be undone.',
    'Clear Stats',
    () => {
      localStorage.removeItem('bymStats');
      closeModal('statsModal');
      toast('Stats cleared', 'success');
    },
    'danger'
  );
}

document.addEventListener('DOMContentLoaded', () => {
  // Radio options
  document.querySelectorAll('.radio-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      opt.querySelector('input[type="radio"]').checked = true;
    });
  });

  // Player input update
  document.getElementById('numPlayers').addEventListener('input', updatePlayerInputs);

  // Restore last setup
  loadSetupMemory();

  // Check for saved game
  _savedGame = loadGameState();
  if (_savedGame?.players?.length) {
    const timeAgo = getTimeAgo(_savedGame.savedAt);
    document.getElementById('restoreBody').innerHTML =
      `A game was saved <strong>${timeAgo}</strong>.<br><br>` +
      `<strong>Players:</strong> ${_savedGame.players.join(', ')}<br>` +
      `<strong>Round:</strong> ${_savedGame.currentRound + 1} of ${_savedGame.roundStructure.length}`;
    openModal('restoreModal');
  }
});
